# maven-build-action
name: "☕️ Build Maven Project"
description: "Setup Maven and build the Java project"

inputs:
  # Optional inputs
  global-settings:
    description: 'Maven global settings file'
    required: false
  path_prefix:
    description: 'Directory location containing project code'
    required: false
    default: '.'
  java-version:
    description: 'OpenJDK version'
    required: false
    default: '21'
  setup-java:
    description: 'Enable or disable Java setup'
    required: false
    default: 'true'
  distribution:
    description: 'OpenJDK distribution'
    required: false
    default: 'temurin'
  mvn-version:
    description: 'Maven version'
    required: false
    default: '3.9.11'
  mvn-params:
    description: 'Maven parameters to pass to the mvn command'
    required: false
  mvn-phases:
    description: 'Comma separated list of phases to execute'
    required: false
    default: 'clean deploy'
  mvn-opts:
    description: 'Maven options'
    required: false
    # yamllint disable rule:line-length
    default: >-
      -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn
      -Dmaven.repo.local=/tmp/r -Dorg.ops4j.pax.url.mvn.localRepository=/tmp/r
    # yamllint enable rule:line-length
  mvn-pom-file:
    description: 'Path to pom.xml file'
    required: false
    default: 'pom.xml'
  mvn-profiles:
    description: 'Comma-delimited list of profiles to activate'
    required: false
  env-vars:
    # yamllint disable-line rule:line-length
    description: "Pass GitHub variables to be exported as environment variables via `toJSON(vars)` or specific variables encoded in JSON format"
    required: false
    default: '{}'
  env-secrets:
    # yamllint disable-line rule:line-length
    description: "Pass GitHub secrets to be exported as environment variables via `toJSON(secrets)` or specific secrets encoded in JSON format"
    required: false
    default: '{}'
  run-jacoco:
    description: 'Boolean defining whether JaCoCo should be run'
    required: false
    default: 'true'
  artifact-upload:
    description: 'Upload the JaCoCo badges directory as a build artifact'
    required: false
    default: 'true'
  artifact-name:
    description: 'Uploaded artifact name (default: maven-build-<job>)'
    required: false
    default: ''

outputs:
  m2repo_path:
    # yamllint disable-line rule:line-length
    description: 'Absolute path to the Maven file deployment repository (m2repo) produced by the build, for downstream publish/stage actions'
    value: ${{ steps.summary.outputs.m2repo_path }}
  m2repo_exists:
    description: 'Whether the build produced the m2repo (true/false)'
    value: ${{ steps.summary.outputs.m2repo_exists }}
  artifact_count:
    description: 'Number of jar/pom/war files found in the m2repo'
    value: ${{ steps.summary.outputs.artifact_count }}
  coverage:
    description: 'JaCoCo line coverage % (empty when JaCoCo skipped)'
    value: ${{ steps.summary.outputs.coverage }}
  branch_coverage:
    # yamllint disable-line rule:line-length
    description: 'JaCoCo branch coverage percentage (empty when JaCoCo did not run)'
    value: ${{ steps.summary.outputs.branch_coverage }}
  artifact_name:
    # yamllint disable-line rule:line-length
    description: 'Name of the uploaded JaCoCo badges artifact (empty when artifact upload is disabled)'
    value: ${{ steps.summary.outputs.artifact_name }}

runs:
  using: 'composite'
  steps:
    - name: 'Setup action/environment'
      shell: bash
      env:
        INPUT_PATH_PREFIX: ${{ inputs.path_prefix }}
      run: |
        # Verify action/environment
        path_prefix="${INPUT_PATH_PREFIX}"
        # Verify path_prefix is a valid directory path
        if [ ! -d "$path_prefix" ]; then
          echo 'Error: invalid path/prefix to project directory ❌'; exit 1
        fi

    - name: 'Setup Java'
      if: ${{ inputs.setup-java == 'true' }}
      # yamllint disable-line rule:line-length
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
      with:
        java-version: ${{ inputs.java-version }}
        distribution: ${{ inputs.distribution }}

    - name: 'Setup Maven'
      # yamllint disable-line rule:line-length
      uses: s4u/setup-maven-action@ba34de01b7f4ba2ab8e2860df8993a29f4477056 # v1.20.0
      with:
        java-version: ${{ inputs.java-version }}
        maven-version: ${{ inputs.mvn-version }}
        checkout-enabled: false # Perform prior to calling this action

    - name: 'Export env variables'
      # yamllint disable-line rule:line-length
      uses: infovista-opensource/vars-to-env-action@3d3e7c8ae1e9e5fcd9ce83e56ab85a6a135d2ffa # 2.0.0
      with:
        secrets: ${{ inputs.env-vars }}

    - name: 'Export env secrets'
      # yamllint disable-line rule:line-length
      uses: infovista-opensource/vars-to-env-action@3d3e7c8ae1e9e5fcd9ce83e56ab85a6a135d2ffa # 2.0.0
      with:
        secrets: ${{ inputs.env-secrets }}

    - name: 'Build code with Maven'
      shell: bash
      env:
        PATH_PREFIX: ${{ inputs.path_prefix }}
        GLOBAL_SETTINGS: ${{ inputs.global-settings }}
        MVN_PHASES: ${{ inputs.mvn-phases }}
        MVN_POM_FILE: ${{ inputs.mvn-pom-file }}
        MVN_PROFILES: ${{ inputs.mvn-profiles }}
        MVN_OPTS: ${{ inputs.mvn-opts }}
        MVN_PARAMS: ${{ inputs.mvn-params }}
      # yamllint disable rule:line-length
      run: |
        echo "Maven build starting"

        if [ -n "$GLOBAL_SETTINGS" ]; then
          echo "$GLOBAL_SETTINGS" > global-settings.xml
          echo "Using provided global settings:"
          cat global-settings.xml
          GLOBAL_SETTINGS_ARG="--global-settings global-settings.xml"
        else
          echo "No global settings provided, using Maven defaults"
          GLOBAL_SETTINGS_ARG=""
        fi

        PROFILES_ARG=""
        if [ -n "$MVN_PROFILES" ]; then
          PROFILES_ARG="-P $MVN_PROFILES"
        fi

        mvn $MVN_PHASES \
            -f "$PATH_PREFIX/$MVN_POM_FILE" \
            -e \
            $GLOBAL_SETTINGS_ARG \
            $PROFILES_ARG \
            -DaltDeploymentRepository=staging::default::file:"${GITHUB_WORKSPACE}"/m2repo \
            $MVN_OPTS $MVN_PARAMS
      # yamllint enable rule:line-length

    - name: 'Generate JaCoCo Badge'
      id: jacoco
      # skip during local testing
      if: ${{ !env.ACT && inputs.run-jacoco == 'true' }}
      # yamllint disable-line rule:line-length
      uses: cicirello/jacoco-badge-generator@72266185b7ee48a6fd74eaf0238395cc8b14fef8 # v2.12.1
      with:
        badges-directory: badges
        generate-branches-badge: true
        generate-summary: true
        on-missing-report: quiet

    - name: 'Generate build summary and outputs'
      id: summary
      shell: bash
      env:
        JAVA_VERSION: ${{ inputs.java-version }}
        MVN_VERSION: ${{ inputs.mvn-version }}
        MVN_PHASES: ${{ inputs.mvn-phases }}
        MVN_PROFILES: ${{ inputs.mvn-profiles }}
        RUN_JACOCO: ${{ inputs.run-jacoco }}
        JACOCO_COVERAGE: ${{ steps.jacoco.outputs.coverage }}
        JACOCO_BRANCHES: ${{ steps.jacoco.outputs.branches }}
        ARTIFACT_UPLOAD: ${{ inputs.artifact-upload }}
        ARTIFACT_NAME_INPUT: ${{ inputs.artifact-name }}
        JOB_NAME: ${{ github.job }}
      run: |
        # Summarise the build and publish action outputs
        set -euo pipefail

        M2REPO_PATH="${GITHUB_WORKSPACE}/m2repo"
        if [ -d "$M2REPO_PATH" ]; then
          M2REPO_EXISTS="true"
          ARTIFACT_COUNT=$(find "$M2REPO_PATH" -type f \
            \( -name '*.jar' -o -name '*.pom' -o -name '*.war' \) \
            | wc -l | tr -d ' ')
        else
          M2REPO_EXISTS="false"
          ARTIFACT_COUNT="0"
        fi

        ARTIFACT_NAME=""
        if [ "$ARTIFACT_UPLOAD" = "true" ]; then
          # Strip CR/LF from the user-provided name first, so a value made
          # up only of CR/LF cannot slip past the non-empty check and yield
          # an empty upload-artifact name or inject extra output lines.
          SANITIZED_NAME=$(printf '%s' "$ARTIFACT_NAME_INPUT" | tr -d '\r\n')
          if [ -n "$SANITIZED_NAME" ]; then
            ARTIFACT_NAME="$SANITIZED_NAME"
          else
            ARTIFACT_NAME="maven-build-${JOB_NAME}"
          fi
        fi

        # JaCoCo coverage values come from generated report files; strip
        # CR/LF so they cannot inject extra GITHUB_OUTPUT lines.
        COVERAGE=$(printf '%s' "$JACOCO_COVERAGE" | tr -d '\r\n')
        BRANCH_COVERAGE=$(printf '%s' "$JACOCO_BRANCHES" | tr -d '\r\n')

        {
          echo "m2repo_path=${M2REPO_PATH}"
          echo "m2repo_exists=${M2REPO_EXISTS}"
          echo "artifact_count=${ARTIFACT_COUNT}"
          echo "coverage=${COVERAGE}"
          echo "branch_coverage=${BRANCH_COVERAGE}"
          echo "artifact_name=${ARTIFACT_NAME}"
        } >> "$GITHUB_OUTPUT"

        {
          echo "## ☕️ Maven Build ✅"
          echo ""
          echo "| Key | Value |"
          echo "|-----|-------|"
          echo "| Java version | ${JAVA_VERSION} |"
          echo "| Maven version | ${MVN_VERSION} |"
          echo "| Phases | ${MVN_PHASES} |"
          if [ -n "$MVN_PROFILES" ]; then
            echo "| Profiles | ${MVN_PROFILES} |"
          fi
          echo "| m2repo produced | ${M2REPO_EXISTS} |"
          echo "| Artifacts (jar/pom/war) | ${ARTIFACT_COUNT} |"
          if [ "$RUN_JACOCO" = "true" ] && [ -n "$COVERAGE" ]; then
            echo "| Line coverage | ${COVERAGE}% |"
            echo "| Branch coverage | ${BRANCH_COVERAGE}% |"
          fi
        } >> "$GITHUB_STEP_SUMMARY"

        echo "Line coverage: ${COVERAGE:-n/a}"
        echo "Branch coverage: ${BRANCH_COVERAGE:-n/a}"

    - name: 'Upload JaCoCo badges artifact'
      if: ${{ inputs.artifact-upload == 'true' }}
      # yamllint disable-line rule:line-length
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ steps.summary.outputs.artifact_name }}
        path: badges/
        if-no-files-found: ignore
        retention-days: 7
